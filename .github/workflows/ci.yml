name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lean install on purpose: the engines + `gitly` CLI need no server deps, and CI
      # running green on `[dev]` alone is a standing proof of that.
      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check shared backend workers alembic

      - name: Test (pytest)
        run: pytest -q

  # A Next.js type error must fail CI, not ship silently — the backend job can't see it.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/mcp/package-lock.json
      - name: Install
        run: npm ci
        working-directory: sdk/mcp
      - name: Build + redaction parity
        run: npm test
        working-directory: sdk/mcp
