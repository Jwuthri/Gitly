name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Lean install on purpose: the engines + `gitly` CLI need no server deps, and CI
      # running green on `[dev]` alone is a standing proof of that.
      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check shared backend workers

      - name: Test (pytest)
        run: pytest -q
