name: docs

# Builds the MkDocs site and publishes it to GitHub Pages.
# One-time setup: Settings → Pages → "Build and deployment" → Source: "Deploy from a
# branch" → branch "gh-pages" / root. This workflow creates & updates that branch.

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache MkDocs build
        uses: actions/cache@v4
        with:
          key: mkdocs-${{ github.sha }}
          restore-keys: mkdocs-
          path: .cache

      - run: pip install "mkdocs-material>=9.5"

      - run: mkdocs gh-deploy --force --no-history
